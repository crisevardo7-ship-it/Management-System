<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive System | Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section" class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">System Login</h2>
            <div class="field-group">
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="field-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="auth-actions">
                <button onclick="login()" class="login-btn">Login</button>
                <button id="reg-btn" onclick="register()" class="reg-btn" style="display: none;">Register</button>
            </div>
            <p id="auth-msg"></p>
            
            <p onclick="showRegister()" style="font-size: 10px; color: #334155; margin-top: 20px; cursor: default;">No account? Contact Admin</p>
        </div>
    </div>

    <div id="main-content" class="container" style="display:none;">
        <div class="header-row">
            <h1>System Dashboard</h1>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>

        <div class="stats-container">
            <div class="stat-card" onclick="shortcutCategory('employees')">
                <div class="stat-icon">👤</div>
                <div>
                    <span class="stat-label">Total Employees</span>
                    <span id="count-employees" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card" onclick="shortcutCategory('inventory')">
                <div class="stat-icon">📦</div>
                <div>
                    <span class="stat-label">Total Inventory</span>
                    <span id="count-inventory" class="stat-value">0</span>
                </div>
            </div>
        </div>
        
        <div class="selection-box">
            <div class="control-row">
                <select id="catSelect" onchange="changeCategory(this.value)">
                    <option value="">-- Choose Category --</option>
                    <option value="employees">Employees List</option>
                    <option value="inventory">Inventory Items</option>
                </select>
                <button class="import-btn" onclick="importFromJSON()">Import</button>
                <button class="export-btn" onclick="exportToExcel()">Export</button>
            </div>
        </div>

        <div id="table-section" style="display:none;">
            <div class="table-wrapper">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
